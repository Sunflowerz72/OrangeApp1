<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=390, initial-scale=1.0, user-scalable=no">
 <link rel="icon" type="image/x-icon" href="logo.png">
 <title>OrangeApp</title>
 <link rel="stylesheet" href="style.css">
 <style>
  .balances-inline { display:flex; justify-content:space-between; align-items:center; gap:20px; margin-bottom:44px; padding:0 12px }
  .balance-item { flex:1; text-align:center; padding:40px 24px; background:rgba(255,255,255,0.12); border-radius:28px; border:1px solid rgba(255,255,255,0.25); min-height:140px; display:flex;flex-direction:column;justify-content:center; }
  .balance-label { font-size:1rem; opacity:0.85; margin-bottom:12px; text-transform:uppercase; letter-spacing:0.5px; font-weight:600 }
  .balance-amount { font-size:2.4rem; font-weight:900; line-height:1 }
  .stocks-list { display:flex; flex-direction:column; gap:28px; margin-bottom:40px }
  .stock-row { display:flex; align-items:center; justify-content:space-between; padding:24px; gap:24px; background:rgba(255,255,255,0.08); border-radius:24px; border:1px solid rgba(255,255,255,0.15); cursor:pointer; transition:all 0.3s cubic-bezier(0.4,0,0.2,1) }
  .stock-row:hover { transform:translateY(-4px); box-shadow:0 20px 40px rgba(0,0,0,0.3); border-color:rgba(255,149,0,0.4) }
  .stock-icon-name { display:flex; align-items:center; gap:20px; flex:1 }
  .stock-icon { font-size:2.2rem; padding:16px; background:linear-gradient(135deg,rgba(255,149,0,0.2),rgba(255,69,0,0.1)); border-radius:24px }
  .stock-details h3 { margin:0; font-weight:900; font-size:1.2rem }
  .stock-shares { opacity:0.7; font-size:0.9rem }
  .stock-price-change { display:flex; flex-direction:column; align-items:flex-end; gap:4px; min-width:120px }
  .price { font-size:1.4rem; font-weight:800 }
  .change { font-size:0.95rem; font-weight:600 }
 </style>
</head>
<body>

 <div class="app-shell" style="overflow:hidden;height:100vh;">

  <header>
   <a href="transactions.html" class="header-link">💸</a>
   <h1 class="header-title">OrangeApp</h1>

   <img class="profile-avatar" src="logo.png" onclick="location.href='settings.html'">

  </header>

  <main style="padding:16px 16px 160px;height:100vh;display:flex;flex-direction:column;">

     <div class="cash-section" style="flex:1;display:flex;align-items:center;justify-content:center;">
    <div class="balance-item glass-card" style="padding:120px 60px;width:90%;max-width:380px;">
     <div class="balance-label" style="font-size:1.3rem;">Cash Balance</div>
     <div class="balance-amount" style="font-size:3.2rem;">$<span id="cash-balance">1250</span></div>
    </div>
   </div>
   <div class="stocks-section" style="flex:1;display:flex;align-items:center;justify-content:center;">
    <div class="balance-item glass-card" style="padding:120px 60px;width:90%;max-width:380px;">
     <div class="balance-label" style="font-size:1.3rem;">Portfolio Value</div>
     <div class="balance-amount" style="font-size:3.2rem;">$<span id="stock-value">1500</span></div>
    </div>
   </div>


  </main>
  </main>

  <nav class="tab-bar" style="position: static; background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(40px); border-top: 1px solid rgba(255, 255, 255, 0.15); box-shadow: inset 0 1px 0 rgba(255,255,255,0.1); display: flex; justify-content: space-around; padding: 12px 24px; margin: 0 16px 20px; border-radius: 28px; height: 76px;">
   <a href="home.html" class="tab-item active"><span>🏠</span><span style="font-size:0.75rem;margin-top:2px">Home</span></a>
   <a href="send.html" class="tab-item"><span>📤</span><span style="font-size:0.75rem;margin-top:2px">Send</span></a>
   <a href="budget.html" class="tab-item"><span>💰</span><span style="font-size:0.75rem;margin-top:2px">Budget</span></a>
   <a href="stocks.html" class="tab-item"><span>📈</span><span style="font-size:0.75rem;margin-top:2px">Stocks</span></a>
  </nav>
 </div>

 <script type="module">
import { initStocks, getPortfolioSummary, stockData, portfolio, stockColors, popularStocks } from './stocks.js';
 import { getCashBalance } from './money.js';

  const cashEl = document.getElementById('cash-balance');
  const stockEl = document.getElementById('stock-value');
  const list = document.getElementById('stocks-list');

  function render() {
   const summary = getPortfolioSummary();
   cashEl.textContent = summary.cashBalance;
   stockEl.textContent = summary.totalValue;

   const stocks = Object.entries(portfolio)
    .sort(([,a],[,b]) => b - a) // Most shares first
    .slice(0,6)
    .concat(popularStocks.slice(0, Math.max(0,6 - Object.keys(portfolio).length)));

   list.innerHTML = stocks.map(([symbol, shares=0]) => {
    const data = stockData[symbol];
    if (!data?.quote) return '';
    const value = data.quote.price * shares;
    const changeClass = data.quote.change >= 0 ? 'positive' : 'negative';
    const color = stockColors[symbol] || '#fff';
    const emoji = {'AAPL':'🍎','GOOGL':'🔍','MSFT':'💻','TSLA':'🚀','AMZN':'📦','NVDA':'🎮','META':'📱','NFLX':'📺'}[symbol] || '📈';
    return `
     <div class="stock-row glass-card" onclick="location.href='stocks.html'">
      <div class="stock-icon-name">
       <span class="stock-icon">${emoji}</span>
       <div class="stock-details">
        <h3>${symbol}</h3>
        <div class="stock-shares">${shares || 'Buy'} shares</div>
       </div>
      </div>
      <div class="stock-price-change">
       <div class="price">$${data.quote.price.toFixed(2)}</div>
       <div class="change ${changeClass}">${data.quote.changePercent > 0 ? '+' : ''}${data.quote.changePercent.toFixed(2)}%</div>
       ${shares ? `<div style="opacity:0.7;font-size:0.85rem">$${value.toFixed(0)}</div>` : ''}
      </div>
     </div>`;
   }).join('') || '<div style="text-align:center;padding:80px 20px;opacity:0.5"><span style="font-size:4rem;display:block;margin-bottom:24px">📊</span><p style="margin:0 0 16px 0;font-size:1.1rem">No stocks yet</p><a href="stocks.html" class="buy-sell" style="padding:20px 28px;display:inline-block;margin-top:16px">Start Trading</a></div>';
  }

  initStocks();
  loadStockData(popularStocks).then(render);
  setInterval(() => loadStockData(popularStocks).then(render), 15000);
 </script>
</body>
</html>
