 <script>
  // Silhouette base PFP (SVG - always works)
  const BASE_PFP = 'data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMTIwIiBoZWlnaHQ9IjEyMCIgdmlld0JveD0iMCAwIDI0IDI0IiBmaWxsPSJub25lIiB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciPgo8cGF0aCBkPSJNMTIgMTJDMTQuMjA5MSAxMiAxNiAxMC4yMDkxIDE2IDhDMzIgNS43OTA4NiAxNC4yMDkxIDQgMTIgNEM5Ljc5MDg2IDQgOCA1Ljc5MDg2IDggOEM4IDEwLjIwOTEgOS43OTA4NiAxMiAxMiAxMloiIGZpbGw9IiNGRjkwMCIvPgo8cGF0aCBkPSJNMjAgMTJDMjAgMTYuMzk3IDE2LjM5NyAxNiAxMiAxNkM3LjYwMjk0IDE2IDQgMTYuMzk3IDQgMTJDNCA3LjYwMjk0IDcuNjAyOTQgNCAxMiA0QzE2LjM5NyA0IDIwIDcuNjAyOTQgMjAgMTJaIiBmaWxsPSJyZ2JhKDI1NSwgMjU1LCAyNTUsIDAuOCkiLz4KPC9zdmc+';

  // Load/Save profile (persists forever)
  function loadProfile() {
   try {
    const saved = localStorage.getItem('orangeProfile');
    if (saved) {
     const profile = JSON.parse(saved);
     document.getElementById('username-input').value = profile.username || '';
     document.getElementById('user-avatar').src = profile.avatar || BASE_PFP;
     document.getElementById('preview-avatar').src = profile.avatar || BASE_PFP;
     document.getElementById('preview-username').textContent = profile.username || 'Your Name';
     
     // Preferences
     document.getElementById('alerts-toggle').checked = profile.alerts || false;
     document.getElementById('dark-mode-toggle').checked = profile.darkMode || false;
     
     // Update EVERYWHERE instantly
     updateAllAvatars(profile.avatar || BASE_PFP);
     return;
    }
   } catch(e) { console.log('Load profile error:', e); }
   
   // Default
   document.getElementById('user-avatar').src = BASE_PFP;
   document.getElementById('preview-avatar').src = BASE_PFP;
   document.getElementById('preview-username').textContent = 'Your Name';
  }

  function saveProfile() {
   const username = document.getElementById('username-input').value.trim() || 'Your Name';
   const alerts = document.getElementById('alerts-toggle').checked;
   const darkMode = document.getElementById('dark-mode-toggle').checked;
   
   const profile = {
    username,
    avatar: document.getElementById('user-avatar').src,
    alerts,
    darkMode,
    timestamp: Date.now()
   };
   
   localStorage.setItem('orangeProfile', JSON.stringify(profile));
   
   // Live preview
   document.getElementById('preview-username').textContent = username;
   
   // Update ALL PFPs instantly
   updateAllAvatars(profile.avatar);
   
   alert(`✅ Saved "${username}" + your photo!\nPersists forever on this computer.`);
  }

  function resetProfile() {
   localStorage.removeItem('orangeProfile');
   location.reload();
  }

  // Update ALL profile pics (header + everywhere)
  function updateAllAvatars(src) {
   // Header top right
   const headers = document.querySelectorAll('header img.profile-avatar');
   headers.forEach(img => img.src = src);
   
   // Settings preview/user avatar
   document.getElementById('user-avatar').src = src;
   document.getElementById('preview-avatar').src = src;
  }

  // Photo upload
  document.addEventListener('DOMContentLoaded', () => {
   const upload = document.getElementById('pfp-upload');
   upload.onchange = (e) => {
    const file = e.target.files[0];
    if (file?.type.startsWith('image/')) {
     const reader = new FileReader();
     reader.onload = (ev) => {
      document.getElementById('user-avatar').src = ev.target.result;
      document.getElementById('preview-avatar').src = ev.target.result;
     };
     reader.readAsDataURL(file);
    }
   };
   
   // Avatar click = upload
   document.getElementById('user-avatar').onclick = () => upload.click();
  });

  // Auto load
  loadProfile();
 </script>

 <style>
  .settings-row {
   display: flex;
   align-items: center;
   gap: 12px;
   padding: 16px;
   cursor: pointer;
   border-radius: 12px;
   transition: all 0.2s;
   margin-bottom: 8px;
  }
  .settings-row:hover {
   background: rgba(255,255,255,0.1);
  }
  input:focus, button:focus {
   outline: none;
   box-shadow: 0 0 0 3px rgba(255,149,0,0.3);
  }
 </style>
</body>
</html>
