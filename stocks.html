<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=390, initial-scale=1.0">
 <link rel="stylesheet" href="style.css">
 <title>Stocks</title>
</head>
<body>
 <div class="app-shell">

  <header class="header-title" style="padding-top:20px;">
   <a href="transactions.html" class="header-link">💸</a>
   <h1 class="header-title">Stocks</h1>


  </header>

  <main style="padding:20px">
   <div class="glass-card" style="text-align:center;">
    <h2>Portfolio: $<span id="total-value">0</span></h2>
    <p>Cash: $<span id="cash-balance">1250</span></p>
   </div>

<div id="stocks-list" style="display:flex;flex-direction:column;gap:12px;margin-top:24px;padding-bottom:100px">

    <!-- Stocks populated here -->
   </div>
  </main>

 <nav class="tab-bar" style="position: static; background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(40px); border-top: 1px solid rgba(255, 255, 255, 0.15); box-shadow: inset 0 1px 0 rgba(255,255,255,0.1); display: flex; justify-content: space-around; padding: 12px 24px; margin: 0 16px 20px; border-radius: 28px; height: 76px;">
   <a href="home.html" class="tab-item"><span>🏠</span><span style="font-size:0.75rem;margin-top:2px">Home</span></a>
   <a href="send.html" class="tab-item"><span>📤</span><span style="font-size:0.75rem;margin-top:2px">Send</span></a>
   <a href="budget.html" class="tab-item"><span>💰</span><span style="font-size:0.75rem;margin-top:2px">Budget</span></a>
   <a href="stocks.html" class="tab-item active"><span>📈</span><span style="font-size:0.75rem;margin-top:2px">Stocks</span></a>
  </nav>

 </div>

 <script type="module">
  import { initStocks, portfolio, balance, fetchQuote, executeTrade, stockColors, getPortfolioSummary } from './stocks.js';

  const stocksList = document.getElementById('stocks-list');
  const totalValueEl = document.getElementById('total-value');
  const cashBalanceEl = document.getElementById('cash-balance');

  const stocks = [
   {symbol: 'AAPL', name: 'Apple', emoji: '🍎', price: 174.50},
   {symbol: 'MSFT', name: 'Microsoft', emoji: '💻', price: 440.30},
   {symbol: 'NVDA', name: 'NVIDIA', emoji: '🎮', price: 132.80},
   {symbol: 'BTC', name: 'Bitcoin', emoji: '₿', price: 68250},
   {symbol: 'SPY', name: 'S&P 500', emoji: '📈', price: 582.10}
  ];

  function updateSummary() {
   const summary = getPortfolioSummary();
   totalValueEl.textContent = summary.totalValue;
   cashBalanceEl.textContent = summary.cashBalance;
  }

  function renderStocks() {
   stocksList.innerHTML = stocks.map(stock => {
    const shares = portfolio[stock.symbol] || 0;
    const value = stock.price * shares;
    return `
<div class="glass-card" style="display:grid;grid-template-columns:1fr auto 1fr;padding:20px;gap:16px;align-items:center">
      <div style="display:flex;align-items:center;gap:16px">

       <span style="font-size:1.5rem">${stock.emoji}</span>
       <div>
        <div style="font-weight:700">${stock.symbol}</div>
        <div style="font-size:0.8rem;opacity:0.7">${stock.name}</div>
       </div>
      </div>
      <div style="text-align:right">
       <div style="font-size:1.2rem;font-weight:700">$${stock.price.toFixed(2)}</div>
       <div style="font-size:0.8rem">${shares} shares</div>
       ${shares ? `<div style="font-size:0.8rem">($${value.toFixed(0)})</div>` : ''}
      </div>
      <div style="display:flex;gap:8px">
       <button onclick="buy('${stock.symbol}', ${stock.price})" style="padding:8px 12px;border-radius:20px;background:rgba(76,175,80,0.3);border:1px solid #4caf50;color:white;font-size:0.8rem;cursor:pointer">Buy</button>
       <button onclick="sell('${stock.symbol}', ${stock.price})" style="padding:8px 12px;border-radius:20px;background:rgba(244,67,54,0.3);border:1px solid #f44336;color:white;font-size:0.8rem;cursor:pointer" ${shares ? '' : 'disabled'}>Sell</button>
      </div>
     </div>
    `;
   }).join('');
   updateSummary();
  }

  window.buy = (symbol, price) => {
   const qty = prompt('Quantity?', '1') || 1;
   try {
    executeTrade(symbol, 'buy', parseInt(qty), price);
    renderStocks();
    alert(`Bought ${qty} ${symbol}`);
   } catch(e) {
    alert(e.message);
   }
  };

  window.sell = (symbol, price) => {
   const qty = prompt('Quantity?', '1') || 1;
   try {
    executeTrade(symbol, 'sell', parseInt(qty), price);
    renderStocks();
    alert(`Sold ${qty} ${symbol}`);
   } catch(e) {
    alert(e.message);
   }
  };

  initStocks();
  renderStocks();
 </script>
</body>
</html>
